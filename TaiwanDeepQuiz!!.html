<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>なにこれ？！台湾DEEPカルチャークイズ</title>
    
    <!-- Google Fonts: Dela Gothic One (極太テレビテロップ風), DotGothic16 (16bitピクセル), Yusei Magic (手書き風) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DotGothic16&family=Yusei+Magic&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        title: ['"Dela Gothic One"', 'cursive'], // タイトル用
                        pixel: ['"DotGothic16"', 'sans-serif'],  // 16bit本文用
                        magic: ['"Yusei Magic"', 'sans-serif'],  // 装飾用
                    }
                }
            }
        }
    </script>

    <!-- カスタムCSS（アニメーションや特殊な装飾） -->
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        /* テキストの縁取り */
        .text-stroke {
            -webkit-text-stroke: 2px black;
        }
        .text-stroke-sm {
            -webkit-text-stroke: 1px black;
        }
        .text-stroke-lg {
            -webkit-text-stroke: 2px black; 
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 画面切り替えのアニメーション */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        /* 💥のアニメーション（揺れながら伸縮） */
        @keyframes wiggle {
            0% { transform: rotate(-10deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.2); }
            100% { transform: rotate(-10deg) scale(1); }
        }
        .animate-wiggle {
            animation: wiggle 1s ease-in-out infinite;
        }

        /* 「なにこれ？！」が斜めのままピョンピョン跳ねる */
        @keyframes bounceTilt {
            0%, 100% { transform: rotate(-15deg) translateY(0); }
            50% { transform: rotate(-15deg) translateY(-8px); }
        }
        .animate-bounce-tilt {
            animation: bounceTilt 1.5s ease-in-out infinite;
        }

        /* スクーターが前進しようとブルンッとする */
        @keyframes drive {
            0%, 100% { transform: rotate(-10deg) translateX(0) translateY(0); }
            50% { transform: rotate(-12deg) translateX(6px) translateY(-3px); }
        }
        .animate-drive {
            animation: drive 1.2s ease-in-out infinite;
        }

        /* ネオブルータリズムのボタンプッシュ効果 */
        .btn-push:active {
            box-shadow: none !important;
            transform: translate(6px, 6px) !important;
        }
        .btn-push-sm:active {
            box-shadow: none !important;
            transform: translate(4px, 4px) !important;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#FF007F] via-[#FFD700] to-[#00FFFF] min-h-screen flex items-center justify-center p-4 font-pixel text-gray-900 overflow-hidden text-lg">

    <!-- アプリのメインコンテナ -->
    <div class="w-full max-w-md bg-white rounded-[32px] shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] border-4 border-black relative overflow-hidden flex flex-col max-h-[90vh]">
        
        <!-- 台湾レトロバッグ「茄芷袋」風のヘッダー装飾 -->
        <div class="h-4 w-full bg-[repeating-linear-gradient(45deg,#E60012,#E60012_10px,#009E60_10px,#009E60_20px,#0050B3_20px,#0050B3_30px)] border-b-4 border-black shrink-0"></div>

        <!-- コンテンツエリア -->
        <div id="app-container" class="p-4 md:p-6 overflow-y-auto flex-grow hide-scrollbar relative bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMiIgZmlsbD0iI2U1ZTVlNSIvPjwvc3ZnPg==')]">
            <!-- JavaScriptでここに画面が描画されます -->
        </div>
    </div>

    <!-- アプリのロジック -->
    <script>
        // クイズのデータ
        const quizData = [
            {
                question: "台湾の人が「あの人、本当に『龜毛（亀の毛）』だよね〜」と言っています。どういう意味でしょうか？",
                options: [
                    "行動がすごく遅くて、いつも遅刻する人",
                    "細かいことを気にする、神経質で面倒くさい人",
                    "滅多に怒らない、心が広くて優しい人",
                    "貯金が趣味で、絶対にお金を使わないケチな人"
                ],
                correctIndex: 1,
                explanation: "「亀には本来毛が生えていないのに、わざわざ毛を探すように細かいことを気にする」という由来から、神経質でこだわりが強すぎる人を指す定番の台湾語スラングです！"
            },
            {
                question: "台湾のネットスラングで「8+9（バー・ジア・ジウ）」と呼ばれる人たちは、どんな人たちでしょうか？",
                options: [
                    "ヤンキーやチンピラっぽい素行の若者",
                    "数学や理系科目が異常に得意な優等生",
                    "残業が激しいサラリーマン",
                    "17歳（8+9=17）の女子高生"
                ],
                correctIndex: 0,
                explanation: "台湾の伝統的なお祭りで顔にペイントをして踊る「八家将（バァジャージャン）」の台湾語の発音が「8+9」に似ていることから、やんちゃな若者を指す言葉としてネットで定着しました。"
            },
            {
                question: "台湾で「あなたって本当に『機車（バイク）』ね！」と言われました。これはどういう意味？",
                options: [
                    "フットワークが軽くて、どこへでもすぐ行く",
                    "エンジン音のように声が大きくて騒がしい",
                    "いちいち文句が多くて、うざい・イライラする",
                    "とてもクールで、スピード感があってかっこいい"
                ],
                correctIndex: 2,
                explanation: "原付バイクが細い道をウロチョロ走ったり、エンジン音がうるさかったり、なかなかエンジンがかからなかったりする様子から、「面倒くさい人・ウザい人」を指す時に使われます。"
            },
            {
                question: "台湾人が「あの人、ちょっと『白目』じゃない？」と言ってました。スラング「白目（バイムー）」はどういう意味？",
                options: [
                    "徹夜明けで目が血走っている人",
                    "嘘つきですぐ目をそらす人",
                    "空気が読めない・非常識な人",
                    "驚きすぎて目を丸くしている人"
                ],
                correctIndex: 2,
                explanation: "「黒目を使わず白目だけで人を見る」ような、相手を見下したり、状況をわきまえず空気が読めない非常識な発言・行動をする人に対して使われるかなり強めの言葉です。"
            },
            {
                question: "台湾語の中に、日本語が混ざった言葉が沢山あります。「頭が固い（融通が利かない）」という意味の言葉はどれでしょうか？",
                options: [
                    "アタマ・コンクリ",
                    "アタマ・レンガ",
                    "アタマ・ショート",
                    "アタマ・カチカチ"
                ],
                correctIndex: 0,
                explanation: "日本語の「頭」と「コンクリート」が合体！コンクリートのようにカチカチで、全く融通が利かない頑固な人を指す面白い台湾語です。（発音はアタマコンクリそのまま！）"
            },
            {
                question: "日本統治時代、日本人の「朝風呂」に入る習慣を見た台湾の人々が「阿沙不魯（アサブロ）」という台湾語のスラングを作りました。さて、現在の意味は？",
                options: [
                    "朝からスッキリ爽やかで、清潔感があること",
                    "おかしなこと、品がないこと、めちゃくちゃなこと",
                    "裸の付き合いのように、初対面でもすぐ仲良くなること",
                    "水に流すように、嫌なことをすぐに忘れること"
                ],
                correctIndex: 1,
                explanation: "当時の台湾の人にとって朝からお風呂に入るのは非常に奇妙に見えたため、「朝風呂＝よくわからない、常識外れ、めちゃくちゃ」という意味に変化して現在も使われています。"
            },
            {
                question: "台湾人がチャットで「520」と数字だけを送ってきました。どういう意味？",
                options: [
                    "ちょっと遅刻します",
                    "愛してる",
                    "ごめんなさい",
                    "ご飯行こう！"
                ],
                correctIndex: 1,
                explanation: "中国語の「我愛你（ウォアイニー）」と、数字の520（ウーアルリン）の発音が似ていることから、恋人同士や推しへの愛情表現としてSNSで広く使われるロマンチックなスラングです。"
            },
            {
                question: "台湾で「吃土（チートゥ）」という言葉があります。直訳すると「土を食べる」ですが、どんな状況で使う？",
                options: [
                    "野菜中心の超健康的なオーガニック生活をしている状態",
                    "お金を使いすぎて金欠になり、月末に食べるものがない状態",
                    "スポーツの試合で大惨敗して、屈辱を味わっている状態",
                    "転んで泥だらけになり、恥ずかしい思いをした状態"
                ],
                correctIndex: 1,
                explanation: "推しのグッズや買い物をしすぎて財布が空っぽになり、「給料日まではもう土を食べて生きるしかない…」という大ピンチな金欠状態を自虐的に表す若者言葉です。"
            },
            {
                question: "台湾で「小鮮肉（シャオシェンロウ）」と呼ばれるのはどんな人？",
                options: [
                    "お肉が大好きな、大食いのぽっちゃりした男の子",
                    "まだ仕事に慣れていない、新入社員",
                    "若くてスタイルが良く、魅力的なイケメン男性",
                    "気が短くて、すぐ喧嘩腰になるヤンキー"
                ],
                correctIndex: 2,
                explanation: "「若くて新鮮な肉」という直訳から、ピチピチしていて魅力的な若い男性（特に筋肉質なアイドルや俳優など）を褒め称える時に使われる、ちょっとユニークな言葉です。"
            },
            {
                question: "台湾の「端午節（端午の節句）」ではちまき（肉粽）を食べますが、正午ぴったりに「あること」に成功すると1年間幸運になると言われています。それは何？",
                options: [
                    "生卵を立てる（立蛋）",
                    "爆竹を素手で鳴らす",
                    "太陽に向かって大声で叫ぶ",
                    "川に飛び込む"
                ],
                correctIndex: 0,
                explanation: "端午節の正午（12時）は1年の中で最も陽の気が強くなる時間とされ、その瞬間に生卵を立てる（立蛋）ことができれば、これからの1年間幸運に恵まれるという言い伝えがあります！"
            }
        ];

        // アイコン(SVG)と絵文字の定義
        const icons = {
            play: '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" class="mr-2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>',
            
            // 💥をアニメーション付きで配置
            sparkles: '<div class="absolute -bottom-4 -right-2 text-[3.5rem] z-20 animate-wiggle drop-shadow-md cursor-default select-none">💥</div>',
            sparklesLarge: '<div class="absolute -top-6 -right-6 text-[4.5rem] z-20 animate-wiggle drop-shadow-md cursor-default select-none">💥</div>',
            
            check: '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-green-600 bg-white rounded-full border-2 border-black"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>',
            cross: '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-red-600 bg-white rounded-full border-2 border-black"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>',
            chevronRight: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="ml-2"><polyline points="9 18 15 12 9 6"></polyline></svg>',
            award: '<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-pink-500"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>',
            refresh: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="mr-3"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>',
            questionIcon: '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-500"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>'
        };

        // アプリの状態
        let gameState = 'start'; 
        let currentQuestion = 0;
        let score = 0;
        let selectedOption = null;
        let isCorrect = false;

        const container = document.getElementById('app-container');

        // ゲーム開始
        window.startGame = () => {
            gameState = 'playing';
            currentQuestion = 0;
            score = 0;
            selectedOption = null;
            render();
        };

        // 選択肢をクリックした時
        window.handleOptionClick = (index) => {
            if (gameState !== 'playing') return;
            
            selectedOption = index;
            isCorrect = (index === quizData[currentQuestion].correctIndex);
            
            if (isCorrect) {
                score++;
            }
            
            gameState = 'explanation';
            render();
        };

        // 次の問題へ
        window.handleNextQuestion = () => {
            if (currentQuestion < quizData.length - 1) {
                currentQuestion++;
                selectedOption = null;
                gameState = 'playing';
            } else {
                gameState = 'result';
            }
            render();
        };

        // 面白くアレンジした結果のコメント取得！
        const getResultFeedback = () => {
            if (score === 10) return { title: "🧧台湾マスター神降臨🧧", desc: "完璧すぎてYBSG（ヤバすぎ）！！前世は台湾人説濃厚ｗｗ 今すぐ夜市で屋台のおっちゃんと語り合ってきて！✨" };
            if (score >= 7) return { title: "🧋現地民いらっしゃい🧋", desc: "めちゃくちゃ詳しいじゃん！台湾の友達とローカル話題で爆盛り上がり確定XD！もう観光客とは呼ばせない！" };
            if (score >= 4) return { title: "🥟台湾行きたいわん🥟", desc: "タピオカと小籠包だけじゃない、ディープな世界へようこそ！ここからもっと台湾のオモロいところ掘っていこうぜ！" };
            return { title: "✈️你好初心者✈️", desc: "「なにこれ！？」の連続でごめんなさいｗｗ 今のあなたは伸びしろしかない！とりあえず台湾ビール飲んで一息つこ！🍻" };
        };

        // 画面描画
        const render = () => {
            if (gameState === 'start') {
                container.innerHTML = `
                    <div class="text-center space-y-6 py-6 flex flex-col items-center justify-center min-h-[60vh] animate-slide-up">
                        
                        <div class="relative w-full px-2 mt-8">
                            <!-- 台湾っぽい絵文字装飾 -->
                            <div class="absolute -top-10 left-2 text-[2.5rem] rotate-[-20deg] z-20 drop-shadow-md select-none">🧋</div>
                            <div class="absolute top-12 -right-4 text-[2.5rem] rotate-[15deg] z-20 drop-shadow-md select-none">🥟</div>
                            
                            <!-- 🛵💨 はウィリーするように前進するアニメーション -->
                            <div class="absolute -bottom-6 left-2 text-[2.5rem] z-20 drop-shadow-md select-none animate-drive">🛵💨</div>
                            
                            <div class="absolute -top-6 right-8 text-2xl font-black text-pink-500 rotate-[15deg] z-20 text-stroke-sm drop-shadow-md select-none">XD</div>

                            <!-- 「なにこれ？！」が斜めのままピョンピョン跳ねる -->
                            <span class="absolute -top-6 -left-2 text-2xl md:text-3xl font-magic text-pink-500 font-bold z-30 select-none animate-bounce-tilt" style="text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff;">なにこれ？！</span>
                            
                            <h1 class="font-title text-[2.8rem] md:text-[3.5rem] leading-[1.1] text-center tracking-wide rotate-[-3deg] py-4 text-yellow-300 text-stroke-lg drop-shadow-[4px_4px_0px_rgba(0,0,0,1)] relative z-10">
                                台湾DEEP<br/>カルチャー<br/>クイズ
                            </h1>
                            
                            ${icons.sparkles}
                        </div>

                        <p class="text-base md:text-lg text-gray-900 font-bold bg-cyan-100 inline-block p-4 rounded-2xl border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] mt-6 relative z-10">
                            教科書には載っていない！<br/>台湾の面白すぎる文化や<br/>スラングをクイズで出題🧧✨
                        </p>

                        <button 
                            onclick="startGame()"
                            class="font-title btn-push mt-8 bg-pink-500 hover:bg-pink-400 text-white py-4 px-10 rounded-full text-2xl md:text-3xl border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] transition-all flex items-center justify-center w-full max-w-[280px] cursor-pointer tracking-wider text-stroke-sm"
                        >
                            ${icons.play} スタート！
                        </button>
                    </div>
                `;
            } 
            else if (gameState === 'playing' || gameState === 'explanation') {
                const q = quizData[currentQuestion];
                const choiceColors = ['bg-pink-400', 'bg-cyan-400', 'bg-yellow-400', 'bg-green-400'];
                const labels = ['A', 'B', 'C', 'D'];
                
                let optionsHtml = '';
                q.options.forEach((opt, index) => {
                    let buttonBaseClass = "w-full p-4 md:p-5 rounded-2xl border-4 border-black font-bold text-left flex items-center transition-all text-base md:text-lg leading-snug ";
                    let badgeClass = `w-8 h-8 md:w-10 md:h-10 rounded-full border-4 border-black flex items-center justify-center mr-4 shrink-0 font-title text-black text-lg md:text-xl `;
                    let isClickable = '';

                    if (gameState === 'playing') {
                        buttonBaseClass += "bg-white text-gray-900 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] btn-push-sm cursor-pointer";
                        badgeClass += choiceColors[index];
                        isClickable = `onclick="handleOptionClick(${index})"`;
                    } else {
                        if (index === q.correctIndex) {
                            buttonBaseClass += "bg-green-400 text-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] z-10 scale-[1.02]";
                            badgeClass += "bg-white";
                        } else if (index === selectedOption) {
                            buttonBaseClass += "bg-red-400 text-white shadow-none translate-x-[4px] translate-y-[4px] opacity-90";
                            badgeClass += "bg-gray-300";
                        } else {
                            buttonBaseClass += "bg-gray-200 text-gray-500 opacity-60 border-gray-400";
                            badgeClass += "bg-gray-300";
                        }
                    }

                    optionsHtml += `
                        <button ${isClickable} class="${buttonBaseClass}">
                            <span class="${badgeClass}">${labels[index]}</span>
                            <span>${opt}</span>
                        </button>
                    `;
                });

                let explanationHtml = '';
                if (gameState === 'explanation') {
                    explanationHtml = `
                        <div class="mt-6 p-5 rounded-2xl border-4 border-black animate-slide-up shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] ${isCorrect ? 'bg-cyan-100' : 'bg-pink-100'}">
                            <div class="flex flex-col mb-4">
                                <div class="flex items-center gap-3 mb-3">
                                    ${isCorrect ? icons.check : icons.cross}
                                    <h3 class="font-title text-2xl md:text-3xl tracking-widest ${isCorrect ? 'text-white text-stroke-lg drop-shadow-[2px_2px_0px_#16a34a]' : 'text-white text-stroke-lg drop-shadow-[2px_2px_0px_#dc2626]'}">
                                        ${isCorrect ? 'せいかい🎉' : 'ざんねん💦'}
                                    </h3>
                                </div>
                                <p class="text-gray-900 text-base md:text-lg leading-relaxed bg-white p-4 rounded-xl border-4 border-black font-bold">
                                    ${q.explanation}
                                </p>
                            </div>
                            
                            <button
                                onclick="handleNextQuestion()"
                                class="font-title btn-push-sm w-full bg-black text-white hover:bg-gray-800 py-4 px-6 rounded-xl text-lg md:text-xl flex items-center justify-center transition-all border-4 border-black shadow-[4px_4px_0px_0px_#FFD700] cursor-pointer tracking-widest"
                            >
                                ${currentQuestion < quizData.length - 1 ? '次の問題へ！' : '結果を見る！'} ${icons.chevronRight}
                            </button>
                        </div>
                    `;
                }

                container.innerHTML = `
                    <div class="space-y-5 pb-8 animate-slide-up">
                        <div class="flex justify-between items-center bg-gray-100 border-4 border-black rounded-full px-4 py-2 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] font-title">
                            <span class="text-sm md:text-base text-pink-600 tracking-widest">
                                Q${currentQuestion + 1} <span class="text-gray-400">/ ${quizData.length}</span>
                            </span>
                            <span class="text-sm md:text-base text-cyan-600 tracking-widest">
                                SCORE: <span class="text-xl">${score}</span>
                            </span>
                        </div>

                        <div class="bg-yellow-200 rounded-2xl p-5 border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] relative mt-4">
                            <div class="absolute -top-5 -right-2 bg-white rounded-full p-2 border-4 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] rotate-[10deg]">
                                ${icons.questionIcon}
                            </div>
                            <h2 class="text-xl md:text-2xl font-bold text-gray-900 leading-snug tracking-wide mt-2">
                                ${q.question}
                            </h2>
                        </div>

                        <div class="flex flex-col gap-4 mt-6">
                            ${optionsHtml}
                        </div>

                        ${explanationHtml}
                    </div>
                `;
            }
            else if (gameState === 'result') {
                const feedback = getResultFeedback();
                container.innerHTML = `
                    <div class="text-center space-y-6 py-8 flex flex-col items-center justify-center min-h-[60vh] animate-slide-up">
                        <div class="relative">
                            <div class="inline-block p-6 bg-yellow-300 rounded-full border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] z-10 relative">
                                ${icons.award}
                            </div>
                            ${icons.sparklesLarge}
                        </div>
                        
                        <h2 class="font-title text-4xl text-white text-stroke-lg drop-shadow-[4px_4px_0px_rgba(0,0,0,1)] tracking-widest">結果発表！！</h2>
                        
                        <div class="font-title text-7xl text-white text-stroke-lg drop-shadow-[6px_6px_0px_rgba(0,0,0,1)]">
                            ${score} <span class="text-4xl text-yellow-300">/ ${quizData.length}</span>
                        </div>

                        <div class="bg-cyan-100 p-5 rounded-3xl border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] mt-4 w-full">
                            <h3 class="font-title text-xl md:text-2xl text-pink-600 mb-4 bg-white inline-block px-4 py-2 rounded-full border-4 border-black rotate-[-2deg] shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">${feedback.title}</h3>
                            <p class="text-gray-900 text-base md:text-lg font-bold bg-white/50 p-3 rounded-xl">${feedback.desc}</p>
                        </div>

                        <button 
                            onclick="startGame()"
                            class="font-title btn-push mt-8 bg-green-400 hover:bg-green-300 text-black py-4 px-8 rounded-full text-xl md:text-2xl border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] transition-all flex items-center justify-center w-full cursor-pointer tracking-widest"
                        >
                            ${icons.refresh} もう１回遊ぶ！
                        </button>
                    </div>
                `;
            }
        };

        // 初期描画
        render();
    </script>
</body>
</html>
